name: Bug Report
description: Report a defect in docs, prototype behavior, or repository workflow
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of what is broken
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include exact commands and inputs
      placeholder: |
        1. Start API with ...
        2. Call endpoint ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS and Python interpreter used
      placeholder: Windows 11, D:\ANACONDA\envs\torch_env\python.exe

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Output
      render: shell
